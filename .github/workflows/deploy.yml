name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: pad-ai-assistant

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          platforms: linux/arm64

      # Bước deploy OCI: bổ sung SSH / OCIR push khi đã cấu hình secrets trên GitHub
      # - OCI_HOST, OCI_USER, OCI_SSH_KEY, GEMINI_API_KEY (runtime trên VPS)
      - name: Deploy placeholder
        run: |
          echo "Image built successfully. Configure OCI secrets to enable remote deploy."
